name: Provision EC2 and Configure Minecraft Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Initialize Terraform
        run: terraform init
        working-directory: minecraft-server-terraform-aws-instance

      - name: Apply Terraform
        run: |
          terraform apply -auto-approve \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}"
        working-directory: minecraft-server-terraform-aws-instance

      - name: Get EC2 Public IP
        id: getip
        run: |
          IP=$(terraform -chdir=minecraft-server-terraform-aws-instance output -raw minecraft_server_ip)
          echo "EC2_PUBLIC_IP=$IP" >> $GITHUB_ENV

      - name: Write SSH key to file
        run: |
          echo "${{ secrets.AWS_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Wait for EC2 and user_data to finish
        run: sleep 90

      - name: Verify Minecraft port is open
        run: |
          nc -zv "$EC2_PUBLIC_IP" 25565 \
            && echo "Minecraft is reachable at $EC2_PUBLIC_IP:25565" \
            || echo "Port 25565 not yet open — server may still be initialising"
